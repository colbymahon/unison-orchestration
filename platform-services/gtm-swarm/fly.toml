# Unison platform-services — total cloud sovereignty (9/9 daemon mesh)
# Shared NVMe volume: single machine runs all daemons via run-platform-mesh.sh (SQLite WAL).
#
# Logical process map (inside platform mesh supervisor):
#   creator_api         → python3 src/creator_api.py
#   sales_swarm         → python3 src/sales_swarm_commander.py
#   query_swarm         → python3 src/query_swarm.py
#   knowledge_crawler   → python3 src/knowledge_crawler.py
#   gap_autopilot       → python3 src/gap_autopilot.py
#   settlement_daemon   → python3 src/settlement_daemon.py
#   gtm_coordinator     → python3 src/gtm_swarm_coordinator.py
#   swarm_commander     → python3 src/swarm_commander.py
#   registry_reboot     → python3 src/registry_agent_reboot.py (mesh boot)
#   watchdog            → bash scripts/platform-watchdog-loop.sh

app = 'unison-platform-services'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  UNISON_STATE_ROOT = '/data'
  CREATOR_API_HOST = '0.0.0.0'
  CREATOR_API_PORT = '8742'
  SALES_TICK_SECONDS = '3600'
  SALES_WORKER_POOL = '15'
  SWARM_AGENT_COUNT = '10'
  SWARM_COORDINATOR_TICK_SECONDS = '30'
  REGISTRY_REBOOT_CONCURRENCY = '10'
  QUERY_WARM_TICK_SECONDS = '900'
  QUERY_WARM_MAX_TARGETS = '48'
  QUERY_WARM_CONCURRENCY = '10'
  KNOWLEDGE_CYCLE_SECONDS = '3600'
  KNOWLEDGE_CRAWLER_CONCURRENCY = '3'
  GAP_AUTOPILOT_POLL_SECONDS = '60'
  GAP_AUTOPILOT_MAX_PER_CYCLE = '50'
  GAP_AUTOPILOT_PARALLEL = '12'
  GTM_TICK_SECONDS = '43200'
  SETTLEMENT_POLL_SECONDS = '12'
  SETTLEMENT_MIN_PAYMENT_USDC = '0.005'
  SETTLEMENT_QUERY_PRICE_USDC = '0.005'
  SETTLEMENT_CREDIT_MODE = 'decrement'
  BASE_CHAIN_ID = '8453'
  USDC_CONTRACT_ADDRESS = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
  PAYMENT_DEST = '0x568D9Da985F8253F59939D124B35E736B8e3B42d'
  CF_FREE_TIER_NAMESPACE_ID = '91fdd2e791234210906e25b8dd90ba96'
  WATCHDOG_INTERVAL_SECONDS = '120'
  UNISON_STOREFRONT_URL = 'https://unisonorchestration.com'
  UNISON_EDGE_GATEWAY_URL = 'https://unison-edge-gateway.unisonorchestration.workers.dev'
  UNISON_MCP_URL = 'https://unison-mcp.fly.dev/mcp/v1/search'
  MOLTBOOK_POSTING_ENABLED = 'true'
  MOLTBOOK_POST_INTERVAL_HOURS = '24'
  MOLTBOOK_SUBMOLT = 'general'
  MOLTBOOK_TARGET_HANDLE = 'hirespark'

[processes]
  platform = 'bash scripts/run-platform-mesh.sh'

[[mounts]]
  source = 'unison_state_vol'
  destination = '/data'

[http_service]
  internal_port = 8742
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['platform']

  [[http_service.checks]]
    interval = '15s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    timeout = '5s'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  processes = ['platform']
