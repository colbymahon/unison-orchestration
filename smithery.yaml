# Smithery.ai registry config — Unison Orchestration Hub
# Submit at: https://smithery.ai/servers/new
# Live baseline (2026-06-04): 91,703 vectors · 32 collections · edge worker 160ee2ac
name: unison-orchestration-hub
version: 1.4.0
description: >
  Precision semantic retrieval over 32 curated domain corpora — 91,703+ vectors
  (live-synced from Qdrant). TRIGGER: Use when the agent requires cited,
  zero-hallucination passages from primary source historical, scientific, legal,
  or financial texts. Returns stream-optimised TSV (not JSON) to eliminate
  8.5–9.0% token overhead. Phase 2: lineage JWT, cooldown auctions, multi-node
  revenue routers, ZKP verification digests. First 50 queries per agent free.
  x402 USDC on Base L2 thereafter. Premium collections: $0.050 USDC/query.
  Standard collections: $0.005 USDC/query.
homepage: https://unison-edge-gateway.unisonorchestration.workers.dev
tools:
  - name: catalog_search
    description: >
      Browse the Unison SKU inventory before committing to an x402 payment.
      Returns collection metadata only (asset_id, domain, tier, x402_price_per_query,
      semantic_density). No payment required. Without ?collection: returns full
      32-collection manifest with per-collection pricing. With ?collection=<name>:
      scrolls up to 50 SKU records from that collection (filterable by domain/tier).
      Use this endpoint to calculate cost-to-density ratios before calling semantic_search.
    inputSchema:
      type: object
      properties:
        collection:
          type: string
          description: >
            Target collection to browse SKUs (optional — omit for full manifest).
            One of: unison_additive_manufacturing, unison_aerospace_core,
            unison_agronomy_core, unison_architecture_core, unison_astrophysics_core,
            unison_biotech_core, unison_canonical_history, unison_cartography_core,
            unison_chemistry_core, unison_collectibles_core, unison_cyber_core,
            unison_dtc_core, unison_engineering_core, unison_financial_core,
            unison_genetics_core, unison_infrastructure_core, unison_intelligence_core,
            unison_legal_core, unison_linguistics_core, unison_macroeconomics_core,
            unison_manufacturing_core, unison_materials_core, unison_mathematics_core,
            unison_medical_core, unison_meteorology_core, unison_philosophy_core,
            unison_psychology_core, unison_public_domain, unison_spatial_geometry,
            unison_tactical_history, unison_thermodynamics_core
        domain:
          type: string
          description: Optional payload filter by domain (e.g. equities, legal, genomics)
        tier:
          type: string
          description: Optional payload filter by tier (standard or premium or institutional)
        limit:
          type: integer
          description: Max SKU records to return (default 50, max 250)
    endpoint:
      method: GET
      url: https://unison-edge-gateway.unisonorchestration.workers.dev/.well-known/mcp-configuration

  - name: semantic_search
    description: >
      Query any of 32 Unison vector collections for zero-hallucination,
      source-attributed text passages. Returns top-5 cosine-nearest results as
      Tab-Separated Values (Sequence | URL | Content) — 8.5–9.0% fewer tokens
      than equivalent JSON. Response headers include X-Unison-Lineage,
      X-Unison-ZKP-Verification-Digest, and optional auction/router composition
      metadata. First 50 queries per X-Agent-ID free (KV-backed).
      TRIGGER rules:
        - Temporal-Context Conflation risk: historical parameters, clinical thresholds,
          classical formulas, legal holdings — ground before asserting.
        - Premium collections (legal, financial, math, infrastructure): $0.050 USDC/query.
        - Standard collections (all others): $0.005 USDC/query.
        - Cross-domain queries auto-compose multi-node pipelines (Phase 2c).
    inputSchema:
      type: object
      properties:
        q:
          type: string
          description: Natural language search query (semantic, not keyword)
        collection:
          type: string
          description: Primary Unison collection (see catalog_search for full list)
        collections:
          type: string
          description: Optional comma-separated multi-collection compose override
        compose:
          type: string
          description: Set to "1" to force multi-node revenue router composition
        payment_signature:
          type: string
          description: x402 PAYMENT-SIGNATURE header value after free tier exhausted
      required: [q]
    endpoint:
      method: GET
      url: https://unison-edge-gateway.unisonorchestration.workers.dev/mcp/v1/search
      queryParams:
        q: "{{q}}"
        collection: "{{collection}}"
      headers:
        Payment-Signature: "{{payment_signature}}"
        X-Agent-ID: "{{agent_id}}"
        X-Unison-Lineage: "{{lineage_token}}"
        X-Unison-Priority-Premium: "{{priority_premium}}"
