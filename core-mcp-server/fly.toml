# fly.toml — Unison MCP Server (iad / Ashburn, co-located with Qdrant us-east4)
app = 'unison-mcp'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    timeout = '2s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
