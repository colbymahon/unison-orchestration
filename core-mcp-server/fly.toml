# fly.toml — Unison MCP Server (iad / Ashburn, co-located with Qdrant us-east4)
app = 'unison-mcp'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'
  QDRANT_WARMUP = '1'
  QDRANT_HNSW_EF = '64'
  EMBED_CACHE_MAX_ENTRIES = '50000'
  EMBED_CACHE_TTL_SECS = '7200'
  HTTP_POOL_MAX_IDLE = '48'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'
    protocol = 'http'
    timeout = '2s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'unison_telemetry_vault'
  destination = '/data'
  initial_size = '1gb'
