name: "Ingest — Legal Core (CourtListener SCOTUS)"

on:
  schedule:
    # 2:00 AM UTC nightly — captures opinions published the prior day
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Number of paginated pages to fetch"
        required: false
        default: "2"

jobs:
  ingest:
    name: "CourtListener SCOTUS → unison_legal_core"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: data-ingestion/requirements.txt

      - name: Install dependencies
        working-directory: data-ingestion
        run: pip install -r requirements.txt

      - name: Run CourtListener ingestion
        working-directory: data-ingestion
        env:
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          QDRANT_URL:               ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY:           ${{ secrets.QDRANT_API_KEY }}
          COURTLISTENER_API_KEY:    ${{ secrets.COURTLISTENER_API_KEY }}
        run: |
          python3 pipeline_courtlistener.py \
            --max-pages ${{ inputs.max_pages || '2' }}
