name: "Daily Hallucination Audit — Unison vs. Frontier Models"

on:
  schedule:
    # 03:00 UTC nightly — after all ingestion workflows complete
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      models:
        description: "Comma-separated model list to benchmark"
        required: false
        default: "gpt-4o,gpt-4o-mini"

jobs:
  benchmark:
    name: "Run deterministic probes and commit audit report"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # Required to commit the benchmark report

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai requests python-dotenv tiktoken

      - name: Run hallucination audit
        env:
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          UNISON_EDGE_URL:      "https://unison-edge-gateway.unisonorchestration.workers.dev"
          BENCHMARK_MODELS:     ${{ inputs.models || 'gpt-4o,gpt-4o-mini' }}
        run: python3 benchmarks/benchmark_bot.py

      - name: Commit benchmark report
        run: |
          git config user.name  "Unison Benchmark Bot"
          git config user.email "benchmarks@unisonorchestration.workers.dev"
          git add benchmarks/
          git diff --cached --quiet || git commit -m \
            "chore(benchmarks): nightly audit $(date -u '+%Y-%m-%d') [automated]"
          git push
